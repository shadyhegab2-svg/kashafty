<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2038"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0e2c4"/>
      <stop offset="100%" stop-color="#c9a876"/>
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="222" fill="none" stroke="#c9a876" stroke-width="8" opacity="0.55"/>

  <g transform="translate(256,246)">
    <!-- side petals -->
    <path d="M-16,-30
             C-70,-70 -130,-70 -168,-28
             C-150,10 -104,30 -60,22
             C-40,18 -24,4 -16,-14 Z" fill="url(#gold)"/>
    <path d="M16,-30
             C70,-70 130,-70 168,-28
             C150,10 104,30 60,22
             C40,18 24,4 16,-14 Z" fill="url(#gold)"/>

    <!-- small stars on the side petals -->
    <g fill="#0f2038">
      <path d="M-118,-32 l5,11 12,1 -9,8 3,12 -11,-6 -11,6 3,-12 -9,-8 12,-1 z"/>
      <path d="M118,-32 l5,11 12,1 -9,8 3,12 -11,-6 -11,6 3,-12 -9,-8 12,-1 z"/>
    </g>

    <!-- center flame / petal -->
    <path d="M0,-170
             C46,-120 46,-56 24,-10
             C40,-2 50,16 50,38
             C50,74 28,100 0,118
             C-28,100 -50,74 -50,38
             C-50,16 -40,-2 -24,-10
             C-46,-56 -46,-120 0,-170 Z" fill="url(#gold)"/>
    <path d="M0,-150 C34,-112 34,-58 16,-18" fill="none" stroke="#0f2038" stroke-width="4" opacity="0.25" stroke-linecap="round"/>
    <path d="M0,-150 C-34,-112 -34,-58 -16,-18" fill="none" stroke="#0f2038" stroke-width="4" opacity="0.25" stroke-linecap="round"/>

    <!-- ribbon band -->
    <path d="M-150,60 Q0,118 150,60 L150,92 Q0,150 -150,92 Z" fill="#7dd3f0"/>
    <path d="M-150,60 Q0,118 150,60" fill="none" stroke="#0f2038" stroke-width="3" opacity="0.2"/>

    <!-- knot -->
    <circle cy="86" r="20" fill="#0f2038" stroke="url(#gold)" stroke-width="5"/>
    <circle cy="86" r="7" fill="#7dd3f0"/>
  </g>
</svg>
